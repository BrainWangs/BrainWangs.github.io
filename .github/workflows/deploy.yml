name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "☁️ Checkout repository"
        # v4 runs on Node 20 (deprecated Sep 2025); v5 runs on Node 24.
        uses: actions/checkout@v5

      - name: "📦 Install pnpm"
        # Intentionally no `version` input — pnpm/action-setup@v4 reads
        # the `packageManager` field in package.json (currently
        # pnpm@11.15.1+sha512...). Pinning a different version here caused
        # ERR_PNPM_BAD_PM_VERSION because it conflicts with package.json.
        uses: pnpm/action-setup@v4

      - name: "⚡ Use Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🔎 Lint code"
        run: pnpm run lint

      - name: "📝 Check code formatting"
        run: pnpm run format:check

      - name: "🚀 Build the project"
        run: pnpm run build

      - name: "📤 Upload Pages artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: "🚀 Deploy to Pages"
        id: deployment
        uses: actions/deploy-pages@v4
